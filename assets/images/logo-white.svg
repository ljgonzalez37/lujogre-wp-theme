  <path d="M 17 32 A 23 23 0 0 1 56 52" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 25 20 A 13 13 0 0 1 50 42" fill="none" stroke="#29B5E8" stroke-width="3" stroke-linecap="round"/>
